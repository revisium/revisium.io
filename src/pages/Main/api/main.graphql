fragment Feature on LandingFeatureFlat {
  title
  description
  link
}

fragment UseCase on LandingUse_caseFlat {
  title
  description
  link
  linkLabel
}

fragment CodeStep on LandingCode_stepFlat {
  label
  description
  title
  code
  extraLabel
  extraCode
}

fragment MainHeroMetric on LandingMainFlatHeroMetricsItems {
  value
  label
}

fragment MainHero on LandingMainFlatHero {
  title
  subtitle
  description
  ctaLabel
  ctaLink
  metrics {
    ...MainHeroMetric
  }
}

fragment MainHeader on LandingMainFlatHeader {
  docsLink
  docsLabel
  githubLink
  githubLabel
}

fragment MainImage on LandingMainFlatImage {
  url
  fileId
  fileName
  mimeType
  status
}

fragment MainFeatures on LandingMainFlatFeatures {
  title
  items {
    ...Feature
  }
}

fragment MainCodeSection on LandingMainFlatCodeSection {
  title
  subtitle
  footerText
  footerLink
  footerLinkLabel
  items {
    ...CodeStep
  }
}

fragment MainUseCases on LandingMainFlatUseCases {
  title
  items {
    ...UseCase
  }
}

fragment MainQuickStart on LandingMainFlatQuickStart {
  title
  standaloneLabel
  standaloneCmd
  cloudLabel
  cloudText
  cloudLink
  cloudLinkLabel
  deployLink
  deployLinkLabel
}

fragment MainOpenSource on LandingMainFlatOpenSource {
  badge
  title
  description
  link
  linkLabel
}

fragment MainPoweredBy on LandingMainFlatPoweredBy {
  title
  description
  link
  linkLabel
}

fragment MainCta on LandingMainFlatCta {
  title
  description
  ctaLabel
  ctaLink
}

fragment MainFooterLink on LandingMainFlatFooterLinksItems {
  label
  url
}

fragment MainFooter on LandingMainFlatFooter {
  copyright
  links {
    ...MainFooterLink
  }
}

query mainPage {
  mainFlat(id: "main") {
    hero {
      ...MainHero
    }
    image {
      ...MainImage
    }
    header {
      ...MainHeader
    }
    features {
      ...MainFeatures
    }
    codeSection {
      ...MainCodeSection
    }
    useCases {
      ...MainUseCases
    }
    quickStart {
      ...MainQuickStart
    }
    openSource {
      ...MainOpenSource
    }
    poweredBy {
      ...MainPoweredBy
    }
    cta {
      ...MainCta
    }
    footer {
      ...MainFooter
    }
  }
}
